# LNMP Docker - Nginx Gateway 主配 | by PiaoYun <piaoyunsoft@163.com> | https://www.chinapyg.com
user  nginx;
worker_processes auto;
worker_cpu_affinity auto;
worker_rlimit_nofile 65535;
pcre_jit on;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    use epoll;
    worker_connections 20480;
    multi_accept on;
    accept_mutex off;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---------- 日志 ----------
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for" '
                      'rt=$request_time uct="$upstream_connect_time" '
                      'urt="$upstream_response_time"';
    log_format  json escape=json '{"time":"$time_iso8601","remote":"$remote_addr",'
        '"host":"$host","method":"$request_method","uri":"$request_uri",'
        '"status":$status,"bytes":$body_bytes_sent,"rt":$request_time,'
        '"ua":"$http_user_agent","ref":"$http_referer","xff":"$http_x_forwarded_for"}';
    access_log  /var/log/nginx/access.log  main buffer=64k flush=5s;

    # ---------- 传输优化 ----------
    sendfile        on;
    sendfile_max_chunk 1m;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    types_hash_max_size 2048;
    server_tokens off;
    server_names_hash_bucket_size 128;

    client_max_body_size 100m;
    client_body_buffer_size 128k;
    client_header_buffer_size 4k;
    large_client_header_buffers 4 16k;

    # 临时文件用容器内 tmpfs, 避免落 NTFS
    client_body_temp_path /tmp/nginx/client_body 1 2;
    proxy_temp_path       /tmp/nginx/proxy 1 2;
    fastcgi_temp_path     /tmp/nginx/fastcgi 1 2;
    uwsgi_temp_path       /tmp/nginx/uwsgi 1 2;
    scgi_temp_path        /tmp/nginx/scgi 1 2;

    # 静态 open file cache
    open_file_cache max=10000 inactive=60s;
    open_file_cache_valid 30s;
    open_file_cache_min_uses 2;
    open_file_cache_errors on;

    # ---------- Gzip ----------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml application/json application/javascript
        application/xml+rss application/atom+xml image/svg+xml
        application/wasm font/woff font/woff2;

    # ---------- 限流默认池 ----------
    limit_req_zone  $binary_remote_addr zone=req_perip:10m rate=20r/s;
    limit_conn_zone $binary_remote_addr zone=conn_perip:10m;

    # ---------- 公共 SSL ----------
    include /etc/nginx/snippets/ssl.conf;

    # ---------- ACME http-01 challenge 公共 server + 默认 80 拒绝 ----------
    server {
        listen 80 default_server;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/acme;
            default_type "text/plain";
        }
        location = /healthz { return 200 "ok"; }
        location / { return 444; }   # 未配置域名直接断连
    }

    # ---------- 默认 HTTPS server: 未知 SNI 直接拒绝 (防漏数据) ----------
    server {
        listen 443 ssl default_server;
        http2 on;
        server_name _;
        # 用占位证书 (acme 容器生成 self-signed default)
        ssl_certificate     /etc/nginx/ssl/default/fullchain.cer;
        ssl_certificate_key /etc/nginx/ssl/default/default.key;
        return 444;
    }

    # ---------- 站点 ----------
    include /etc/nginx/conf.d/*.conf;
}
