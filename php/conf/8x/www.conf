[global]
pid = /run/php-fpm.pid
error_log = /var/log/php/php-fpm.log
log_level = notice
emergency_restart_threshold = 10
emergency_restart_interval = 1m
process_control_timeout = 10s
daemonize = no

[www]
user = www-data
group = www-data
listen = 0.0.0.0:9000
listen.backlog = 65535

pm = dynamic
; 进程数根据宿主内存调优:
;   <1G:    max_children=10  start=2   min=1   max_spare=3
;   1-2G:   max_children=20  start=5   min=3   max_spare=10
;   2-4G:   max_children=40  start=10  min=5   max_spare=15
;   4-8G:   max_children=60  start=20  min=10  max_spare=30
;   8G+:    max_children=80  start=30  min=15  max_spare=40
pm.max_children = 50
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 2000
pm.process_idle_timeout = 30s
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

request_terminate_timeout = 0
request_slowlog_timeout = 10
slowlog = /var/log/php/slow.log

rlimit_files = 65535
rlimit_core = 0

catch_workers_output = yes
decorate_workers_output = no
clear_env = no

php_admin_value[error_log] = /var/log/php/error.log
php_admin_flag[log_errors] = on
