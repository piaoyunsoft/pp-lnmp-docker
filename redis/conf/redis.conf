# Redis 生产基础配置 (密码/maxmemory 走命令行)
bind 0.0.0.0
protected-mode yes
tcp-backlog 511
timeout 0
tcp-keepalive 300

# 持久化: AOF + RDB
appendonly yes
appendfsync everysec
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
save 900 1
save 300 10
save 60 10000

# 日志
loglevel notice
logfile ""

# 慢日志
slowlog-log-slower-than 10000
slowlog-max-len 128

# 客户端
maxclients 10000

# 禁危险命令 (生产环境取消注释)
