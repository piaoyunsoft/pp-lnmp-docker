# ============================================================
# LNMP Docker 日志轮转 (生产用)
#
# Author:  PiaoYun <piaoyunsoft@163.com>
# Website: https://www.chinapyg.com
# License: MIT
#
# 安装: cp logrotate.conf /etc/logrotate.d/lnmp
# 测试: logrotate -d /etc/logrotate.d/lnmp
# ============================================================

/opt/lnmp_docker/nginx-gateway/logs/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    sharedscripts
    postrotate
        docker exec pp_lnmp_nginx nginx -s reopen 2>/dev/null || true
    endscript
}

/opt/lnmp_docker/mysql/logs/*.log /opt/lnmp_docker/mysql57/logs/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}

/opt/lnmp_docker/sites/*/logs/*.log {
    daily
    rotate 14
    missingok
    notifempty
    compress
    delaycompress
    copytruncate
}
